services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailer:
    build:
      context: ./mailer
      dockerfile: Dockerfile.dev
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-email_queue}
      MAIL_FROM: ${MAIL_FROM:-"Hi Krew <noreply@hikrew.com>"}
      MAIL_PROVIDERS: ${MAIL_PROVIDERS:-resend,brevo}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    volumes:
      - ./mailer/app:/app/app:z
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
      STORAGE_TYPE: ${STORAGE_TYPE}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE}
      ALLOWED_IMAGE_TYPES: ${ALLOWED_IMAGE_TYPES}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_FREELANCER_EMAIL: ${SEED_FREELANCER_EMAIL}
      SEED_FREELANCER_PASSWORD: ${SEED_FREELANCER_PASSWORD}
      REDIS_URL: redis://redis:6379
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME:-email_queue}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      KREW_RECURRENTE_PUBLIC_KEY: ${KREW_RECURRENTE_PUBLIC_KEY}
      KREW_RECURRENTE_SECRET_KEY: ${KREW_RECURRENTE_SECRET_KEY}
      BILLING_PRO_MONTHLY_CENTS: ${BILLING_PRO_MONTHLY_CENTS}
      BILLING_PRO_YEARLY_CENTS: ${BILLING_PRO_YEARLY_CENTS}
      BILLING_PREMIUM_MONTHLY_CENTS: ${BILLING_PREMIUM_MONTHLY_CENTS}
      BILLING_PREMIUM_YEARLY_CENTS: ${BILLING_PREMIUM_YEARLY_CENTS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    volumes:
      - ./backend:/app:z
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run start:dev

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_IMAGE_BACKEND_URL: ${NEXT_PUBLIC_IMAGE_BACKEND_URL}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend-app:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started
    command: npm run dev

  frontend-public:
    build:
      context: ./frontend-public
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_IMAGE_BACKEND_URL: ${NEXT_PUBLIC_IMAGE_BACKEND_URL}
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_PRO_PRICE: ${NEXT_PUBLIC_PRO_PRICE}
      NEXT_PUBLIC_PREMIUM_PRICE: ${NEXT_PUBLIC_PREMIUM_PRICE}
    volumes:
      - ./frontend-public:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started
    command: npm run dev

volumes:
  postgres_data:
