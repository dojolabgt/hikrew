services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "6379"

  mailer:
    build:
      context: ./mailer
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_QUEUE_NAME=${REDIS_QUEUE_NAME:-email_queue}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_PROVIDERS=${MAIL_PROVIDERS:-resend,brevo}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_IMAGE_BACKEND_URL: ${NEXT_PUBLIC_IMAGE_BACKEND_URL}
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_IMAGE_BACKEND_URL=${NEXT_PUBLIC_IMAGE_BACKEND_URL}
      - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    # Dokploy handles port mapping via reverse proxy
    expose:
      - "3000"

  frontend-public:
    build:
      context: ./frontend-public
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
        NEXT_PUBLIC_IMAGE_BACKEND_URL: ${NEXT_PUBLIC_IMAGE_BACKEND_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_PRO_PRICE: ${NEXT_PUBLIC_PRO_PRICE}
        NEXT_PUBLIC_PREMIUM_PRICE: ${NEXT_PUBLIC_PREMIUM_PRICE}
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
      - NEXT_PUBLIC_IMAGE_BACKEND_URL=${NEXT_PUBLIC_IMAGE_BACKEND_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_PRO_PRICE=${NEXT_PUBLIC_PRO_PRICE}
      - NEXT_PUBLIC_PREMIUM_PRICE=${NEXT_PUBLIC_PREMIUM_PRICE}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    # Dokploy handles port mapping via reverse proxy
    expose:
      - "3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PORT=${PORT}
      - BODY_PARSER_LIMIT=${BODY_PARSER_LIMIT:-10mb}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-10}
      - FRONTEND_URL=${FRONTEND_URL}
      - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_IMAGE_BACKEND_URL=${NEXT_PUBLIC_IMAGE_BACKEND_URL}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL}
      - NODE_ENV=${NODE_ENV}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - UPLOAD_MAX_SIZE=${UPLOAD_MAX_SIZE}
      - ALLOWED_IMAGE_TYPES=${ALLOWED_IMAGE_TYPES}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_FREELANCER_EMAIL=${SEED_FREELANCER_EMAIL}
      - SEED_FREELANCER_PASSWORD=${SEED_FREELANCER_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - REDIS_QUEUE_NAME=${REDIS_QUEUE_NAME:-email_queue}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - KREW_RECURRENTE_PUBLIC_KEY=${KREW_RECURRENTE_PUBLIC_KEY}
      - KREW_RECURRENTE_SECRET_KEY=${KREW_RECURRENTE_SECRET_KEY}
      - BILLING_PRO_MONTHLY_CENTS=${BILLING_PRO_MONTHLY_CENTS}
      - BILLING_PRO_YEARLY_CENTS=${BILLING_PRO_YEARLY_CENTS}
      - BILLING_PREMIUM_MONTHLY_CENTS=${BILLING_PREMIUM_MONTHLY_CENTS}
      - BILLING_PREMIUM_YEARLY_CENTS=${BILLING_PREMIUM_YEARLY_CENTS}
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network
    # Dokploy handles port mapping via reverse proxy
    expose:
      - "4000"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    # Internal port only
    expose:
      - "5432"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uploads:
